services:
  - type: web
    name: runny-ai
    runtime: static
    buildCommand: bash render-build.sh
    staticPublishPath: apps/runny_app/build/web
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob: https://*.supabase.co https://openweathermap.org https://*.openweathermap.org; connect-src 'self' https://*.supabase.co wss://*.supabase.co; worker-src 'self' blob:; manifest-src 'self'; frame-src https://pay.payos.vn; upgrade-insecure-requests"
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: "camera=(self), geolocation=(self), microphone=(self), payment=()"
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin-allow-popups
