# Supabase local development config
project_id = "runny-ai"

[api]
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
port = 54323

[inbucket]
port = 54324

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://localhost:5173", "http://localhost:8080"]
jwt_expiry = 3600
refresh_token_rotation_enabled = true
security_captcha_enabled = false

[functions]
verify_jwt = false
