# Supabase local development config
project_id = "runny-ai"

[api]
port = 34321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 34322
major_version = 15

[studio]
port = 34323

[inbucket]
port = 34324

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://localhost:5173", "http://localhost:8080"]
jwt_expiry = 3600

[auth.email]
enable_confirmations = false

[functions]
# verify_jwt = true

# Strava goi webhook khong kem JWT cua Supabase -> tat xac thuc JWT cho rieng
# function nay (tren cloud: tat "Verify JWT" cho strava_webhook trong Dashboard).
[functions.strava_webhook]
verify_jwt = false

# PayOS goi webhook khong kem JWT cua Supabase -> tat xac thuc JWT; tu xac thuc
# bang chu ky checksum trong code (tren cloud: tat "Verify JWT" trong Dashboard).
[functions.payos-webhook]
verify_jwt = false

[analytics]
enabled = true
port = 44327