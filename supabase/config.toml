# Supabase local development config
project_id = "runny-ai"

[api]
port = 34321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 34322
major_version = 15

[studio]
port = 34323

[inbucket]
port = 34324

[storage]
file_size_limit = "50MiB"

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000", "http://localhost:5173", "http://localhost:8080"]
jwt_expiry = 3600

[auth.email]
enable_confirmations = false

[functions]
# verify_jwt = true

# Cac function huong client CHI decode JWT (khong tu verify chu ky) -> BAT BUOC
# platform verify_jwt = true de chan token gia mao. Ghim tuong minh o day de mot
# thay doi Dashboard vo tinh khong lam mat lop bao ve nay.
# (Tren cloud: dam bao "Verify JWT" DANG BAT cho cac function nay trong Dashboard.)
[functions.openrouter]
verify_jwt = true

[functions.training-plan]
verify_jwt = true

[functions.food-recognition]
verify_jwt = true

[functions.weather]
verify_jwt = true

[functions.payos-create-payment]
verify_jwt = true

[functions.strava_oauth]
verify_jwt = true

# Strava goi webhook khong kem JWT cua Supabase -> tat xac thuc JWT cho rieng
# function nay (tren cloud: tat "Verify JWT" cho strava_webhook trong Dashboard).
[functions.strava_webhook]
verify_jwt = false

# Retry worker is called only by a Dashboard cron/monitor with
# STRAVA_WEBHOOK_WORKER_TOKEN, not by end-user JWTs.
[functions.strava-webhook-worker]
verify_jwt = false

# Durable plan retry worker is called by a Dashboard cron with a secret token.
[functions.training-plan-worker]
verify_jwt = false

# PayOS goi webhook khong kem JWT cua Supabase -> tat xac thuc JWT; tu xac thuc
# bang chu ky checksum trong code (tren cloud: tat "Verify JWT" trong Dashboard).
[functions.payos-webhook]
verify_jwt = false

[analytics]
enabled = true
port = 44327
