name: Flutter CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  ci:
    name: Flutter Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run AI Gateway Policy Tests
        run: >-
          deno test --allow-env=MODAL_MODEL
          supabase/functions/_shared/ai_policy_test.ts
          supabase/functions/_shared/ai_provider_test.ts

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'
          cache: true

      - name: Install Dependencies
        run: |
          cd apps/runny_app
          cp .env.example .env
          flutter pub get

      - name: Code Analysis
        run: |
          cd apps/runny_app
          flutter analyze

      - name: Run Tests and P0/P1 Coverage Gates
        run: |
          cd apps/runny_app
          flutter test --coverage
          dart run tool/check_coverage.dart

      - name: Build Release Web
        run: |
          cd apps/runny_app
          flutter build web --release --no-web-resources-cdn
