<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Runny AI - Trợ lý chạy bộ thông minh">
  <meta name="theme-color" content="#050814">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Runny AI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Runny AI - Trợ lý chạy bộ thông minh</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Bắt sự kiện cài PWA: trình duyệt kích hoạt `beforeinstallprompt` khi app đủ
    điều kiện cài. Ta chặn banner mặc định, lưu lại event để Dart gọi `prompt()`
    khi người dùng bấm nút "Cài ứng dụng". `onPwaInstallable`/`onPwaInstalled`
    là các callback do phía Dart gắn vào để cập nhật hiển thị nút.
  -->
  <script>
    window.deferredPwaPrompt = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      window.deferredPwaPrompt = e;
      if (typeof window.onPwaInstallable === 'function') window.onPwaInstallable();
    });
    window.addEventListener('appinstalled', function () {
      window.deferredPwaPrompt = null;
      if (typeof window.onPwaInstalled === 'function') window.onPwaInstalled();
    });
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
